<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查询</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">查询功能</h1>
        
        <!-- 发送请求表单 -->
        <div class="card shadow mb-4">
            <div class="card-body">
                <h2>发送数据请求</h2>
                <form id="sendRequestForm">
                    <div class="mb-3">
                        <label for="receiver" class="form-label">接收者用户名</label>
                        <input type="text" class="form-control" id="receiver" required>
                    </div>
                    <button type="submit" class="btn btn-primary">发送请求</button>
                </form>
            </div>
        </div>
        
        <!-- 查询数据表单 -->
        <div class="card shadow">
            <div class="card-body">
                <h2>查询用户数据</h2>
                <form id="queryDataForm">
                    <div class="mb-3">
                        <label for="targetUser" class="form-label">要查询的用户名</label>
                        <input type="text" class="form-control" id="targetUser" required>
                    </div>
                    <button type="submit" class="btn btn-primary">查询数据</button>
                </form>
                
                <!-- 在适当位置添加结果显示区域 -->
                <div id="queryResult" class="mt-4">
                    <h4>查询结果</h4>
                    <div class="card">
                        <div class="card-body" id="resultContent">
                            <!-- 结果将在这里显示 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="/dashboard" class="btn btn-secondary">返回仪表盘</a>
        </div>
    </div>

    <script>
        // 发送请求处理
        document.getElementById('sendRequestForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const receiver = document.getElementById('receiver').value;
            
            // 检查是否尝试向自己发送请求
            if (receiver === '{{ session.username }}') {
                alert('不能向自己发送请求');
                return;
            }
            
            fetch('/send_request', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    receiver: receiver
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('请求发送成功');
                } else {
                    alert('请求发送失败: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('请求发送失败');
            });
        });

        // 查询数据处理
        // 替换原有的fetch处理
        document.getElementById('queryDataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const targetUser = document.getElementById('targetUser').value;
            
            fetch('/query_data', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({target_user: targetUser})
            })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => { throw new Error(text) });
                }
                return response.text();
            })
            .then(data => {
                const resultDiv = document.getElementById('queryResult');
                const contentDiv = document.getElementById('resultContent');
                
                // 清空之前的结果
                contentDiv.innerHTML = '';
                
                // 直接显示原始数据
                const pre = document.createElement('pre');
                pre.textContent = data;
                contentDiv.appendChild(pre);
                
                // 显示结果区域
                resultDiv.style.display = 'block';
            })
            .catch(error => {
                const contentDiv = document.getElementById('resultContent');
                contentDiv.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
                document.getElementById('queryResult').style.display = 'block';
            });
        });
    </script>
</body>
</html>
